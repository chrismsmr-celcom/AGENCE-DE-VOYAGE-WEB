<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vols - Terra Voyage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'montserrat', sans-serif; background-color: #f5f7fa; }
        .search-summary-bar { background-color: #2b59ff; color: white; }
        .flight-card { transition: all 0.2s ease; border: 1px solid #eef0f2; }
        .flight-card:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body>

    <header class="search-summary-bar py-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-white hover:opacity-80"><i class="fas fa-arrow-left"></i></a>
                <div class="flex flex-col">
                    <div class="flex items-center gap-2 text-sm font-bold">
                        <span id="res-origin">...</span> 
                        <i class="fas fa-arrow-right text-[10px] opacity-70"></i> 
                        <span id="res-dest">...</span>
                    </div>
                    <div class="text-[11px] opacity-80">
                        <span id="res-dates">Chargement...</span> • <span id="res-passengers">...</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <select id="currency-selector" onchange="updateCurrency()" class="bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-xs font-bold focus:outline-none cursor-pointer hover:bg-white/20 transition-all">
                    <option value="USD" class="text-gray-800">USD ($)</option>
                    <option value="EUR" class="text-gray-800">EUR (€)</option>
                    <option value="CDF" class="text-gray-800">CDF (FC)</option>
                    <option value="XAF" class="text-gray-800">XAF (CFA)</option>
                    <option value="AED" class="text-gray-800">AED (د.إ)</option>
                </select>

                <button onclick="window.history.back()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-xs font-bold transition-all">
                    Modifier
                </button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6">
        
<aside class="w-full lg:w-72 space-y-4">
    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
        <h3 class="text-xs font-bold uppercase text-gray-400 mb-4 tracking-wider">Trier les résultats</h3>
        <select id="sort-selector" onchange="filterData()" class="w-full text-sm font-bold text-blue-600 bg-blue-50 px-3 py-2.5 rounded-lg focus:outline-none cursor-pointer border border-blue-100 hover:bg-blue-100 transition-all">
            <option value="price_asc">Prix : Moins cher</option>
            <option value="price_desc">Prix : Plus cher</option>
            <option value="duration_asc">Le plus rapide</option>
        </select>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
        <h3 class="text-xs font-bold uppercase text-gray-400 mb-4 tracking-wider">Escales</h3>
        <div class="space-y-3">
            <label class="flex items-center gap-3 text-sm font-medium text-gray-700 cursor-pointer group">
                <input type="checkbox" class="filter-stop w-4 h-4 rounded text-blue-600 border-gray-300" value="0" checked onchange="filterData()"> 
                <span class="group-hover:text-blue-600">Direct</span>
            </label>
            <label class="flex items-center gap-3 text-sm font-medium text-gray-700 cursor-pointer group">
                <input type="checkbox" class="filter-stop w-4 h-4 rounded text-blue-600 border-gray-300" value="1" checked onchange="filterData()"> 
                <span class="group-hover:text-blue-600">1 escale</span>
            </label>
            <label class="flex items-center gap-3 text-sm font-medium text-gray-700 cursor-pointer group">
                <input type="checkbox" class="filter-stop w-4 h-4 rounded text-blue-600 border-gray-300" value="2" checked onchange="filterData()"> 
                <span class="group-hover:text-blue-600">2+ escales</span>
            </label>
        </div>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
        <h3 class="text-xs font-bold uppercase text-gray-400 mb-4 tracking-wider">Compagnies</h3>
        <div id="filter-airlines" class="max-h-60 overflow-y-auto space-y-3 pr-2 custom-scrollbar">
            </div>
    </div>
   <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-xs font-bold uppercase text-gray-400 mb-4 tracking-wider">Alliances</h3>
                <div id="filter-alliances" class="space-y-3">
                    <p class="text-[10px] text-gray-400 italic font-medium">Inclus dans les résultats</p>
                </div>
            </div>
</aside>

        <main class="flex-1 space-y-4">
            <div id="flights-list" class="space-y-4">
                <div class="text-center py-20 bg-white rounded-2xl shadow-sm">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                    <p class="mt-4 text-gray-500 font-medium">Nous cherchons les meilleurs tarifs pour vous...</p>
                </div>
                
            </div>
        </main>
    </div>

    <script>
        // --- CONFIGURATION DEVISES ---
        const exchangeRates = { "USD": 1, "EUR": 0.92, "CDF": 2850, "XAF": 605, "AED": 3.67 };
        let currentCurrency = "USD";
        let rawOffers = []; 

        const params = new URLSearchParams(window.location.search);

        document.addEventListener('DOMContentLoaded', () => {
            // Mise à jour de l'UI Header
            document.getElementById('res-origin').innerText = params.get('origin') || 'PAR';
            document.getElementById('res-dest').innerText = params.get('dest') || 'BKK';
            document.getElementById('res-dates').innerText = `${params.get('departureDate')} ${params.get('returnDate') ? '- ' + params.get('returnDate') : ''}`;
            document.getElementById('res-passengers').innerText = `${params.get('adults') || 1} Passager(s), ${(params.get('class') || 'Economy').toUpperCase()}`;
            
            fetchVols();
        });

        async function fetchVols() {
            const payload = {
                origin: params.get('origin'),
                destination: params.get('dest'),
                departureDate: params.get('departureDate'),
                returnDate: params.get('returnDate') || null,
                passengers: params.get('adults') || 1,
                cabinClass: params.get('class') || 'economy',
                tripType: params.get('returnDate') ? 'round_trip' : 'one_way'
            };

            try {
                const response = await fetch('https://agence-de-voyage-web.onrender.com/search-flights', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('Erreur Serveur');
                const data = await response.json();
                
                rawOffers = data.offers || [];
                filterData(); // Affiche et filtre les données
                renderFilters(rawOffers);
            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById('flights-list').innerHTML = `<div class="bg-white p-10 rounded-2xl text-center border-2 border-dashed border-red-100"><p class="text-red-400 font-bold">Erreur de connexion au serveur.</p></div>`;
            }
        }

        function updateCurrency() {
            currentCurrency = document.getElementById('currency-selector').value;
            filterData(); // On rafraîchit l'affichage avec la nouvelle devise
        }

        function filterData() {
            const allowedStops = Array.from(document.querySelectorAll('.filter-stop:checked')).map(el => parseInt(el.value));
            
            const filtered = rawOffers.filter(offer => {
                const stopCount = offer.slices[0].segments.length - 1;
                return allowedStops.includes(stopCount) || (allowedStops.includes(2) && stopCount >= 2);
            });

            renderResults(filtered);
        }

        function renderResults(offers) {
            const container = document.getElementById('flights-list');
            container.innerHTML = offers.length ? '' : '<p class="text-center py-10 text-gray-500">Aucun vol ne correspond à vos filtres.</p>'; 

            offers.forEach(offer => {
                const slice = offer.slices[0];
                const segment = slice.segments[0];
                const airline = offer.owner;
                
                // Calcul du prix converti
                const rate = exchangeRates[currentCurrency] || 1;
                const price = Math.round(offer.total_amount * rate);
                const symbol = currentCurrency === 'EUR' ? '€' : (currentCurrency === 'USD' ? '$' : currentCurrency);

                container.innerHTML += `
                    <div class="flight-card bg-white rounded-2xl p-6 flex flex-col md:flex-row items-center gap-6">
                        <div class="w-full md:w-32 flex flex-col items-center text-center">
                            <img src="${airline.logo_symbol_url}" alt="${airline.name}" class="w-12 h-12 object-contain mb-2 rounded-md shadow-sm">
                            <p class="text-[10px] font-bold text-gray-800 uppercase tracking-tight">${airline.name}</p>
                        </div>

                        <div class="flex-1 flex items-center justify-between w-full">
                            <div class="text-center md:text-left">
                                <p class="text-xl font-bold text-gray-900">${formatTime(segment.departing_at)}</p>
                                <p class="text-[12px] font-bold text-gray-400 uppercase">${segment.origin.iata_code}</p>
                            </div>
                            
                            <div class="flex-1 px-4 lg:px-12 flex flex-col items-center">
                                <p class="text-[10px] text-gray-400 font-medium mb-1">${formatDuration(slice.duration)}</p>
                                <div class="w-full h-[2px] bg-gray-100 relative">
                                    <div class="absolute -top-[3px] left-1/2 -translate-x-1/2 w-2 h-2 rounded-full bg-blue-500 border-2 border-white shadow-sm"></div>
                                </div>
                                <p class="text-[10px] font-bold text-green-500 mt-1 uppercase tracking-widest">
                                    ${slice.segments.length > 1 ? (slice.segments.length - 1) + ' Escale(s)' : 'Direct'}
                                </p>
                            </div>

                            <div class="text-center md:text-right">
                                <p class="text-xl font-bold text-gray-900">${formatTime(segment.arriving_at)}</p>
                                <p class="text-[12px] font-bold text-gray-400 uppercase">${segment.destination.iata_code}</p>
                            </div>
                        </div>

                        <div class="w-full md:w-44 md:border-l border-gray-100 md:pl-6 flex flex-col items-center md:items-end">
                            <p class="text-2xl font-black text-blue-600">${price} ${symbol}</p>
                            <p class="text-[9px] text-gray-400 uppercase font-bold tracking-tighter">Prix total TTC</p>
                            <button class="w-full mt-4 bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl text-[11px] font-extrabold uppercase tracking-widest shadow-md transition-all">
                                Sélectionner
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function renderFilters(offers) {
            const airlineList = document.getElementById('filter-airlines');
            const airlines = {};
            offers.forEach(o => {
                if (!airlines[o.owner.name]) airlines[o.owner.name] = { count: 0, logo: o.owner.logo_symbol_url };
                airlines[o.owner.name].count++;
            });

            airlineList.innerHTML = Object.entries(airlines).map(([name, info]) => `
                <label class="flex items-center justify-between group cursor-pointer">
                    <div class="flex items-center gap-3">
                        <input type="checkbox" checked class="w-4 h-4 rounded text-blue-600 border-gray-300">
                        <img src="${info.logo}" class="w-4 h-4 object-contain grayscale group-hover:grayscale-0 transition-all">
                        <span class="text-sm font-medium text-gray-700 group-hover:text-blue-600">${name}</span>
                    </div>
                    <span class="text-[10px] font-bold text-gray-300">${info.count}</span>
                </label>
            `).join('');
        }

        function formatTime(dateStr) { return new Date(dateStr).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' }); }
        function formatDuration(iso) { return iso.replace('PT', '').replace('H', 'h ').replace('M', 'm'); }
        // Utilitaire pour convertir la durée ISO de Duffel (ex: PT10H30M) en minutes totales
function parseDuration(iso) {
    if (!iso) return 0;
    const hours = iso.match(/(\d+)H/) ? parseInt(iso.match(/(\d+)H/)[1]) : 0;
    const minutes = iso.match(/(\d+)M/) ? parseInt(iso.match(/(\d+)M/)[1]) : 0;
    return (hours * 60) + minutes;
}

// Modifie ta fonction filterData existante pour inclure le tri
function filterData() {
    const allowedStops = Array.from(document.querySelectorAll('.filter-stop:checked')).map(el => parseInt(el.value));
    const sortBy = document.getElementById('sort-selector').value;
    
    // 1. Filtrage
    let filtered = rawOffers.filter(offer => {
        const stopCount = offer.slices[0].segments.length - 1;
        return allowedStops.includes(stopCount) || (allowedStops.includes(2) && stopCount >= 2);
    });

    // 2. Tri
    if (sortBy === 'price_asc') {
        filtered.sort((a, b) => parseFloat(a.total_amount) - parseFloat(b.total_amount));
    } else if (sortBy === 'price_desc') {
        filtered.sort((a, b) => parseFloat(b.total_amount) - parseFloat(a.total_amount));
    } else if (sortBy === 'duration_asc') {
        filtered.sort((a, b) => parseDuration(a.slices[0].duration) - parseDuration(b.slices[0].duration));
    }

    renderResults(filtered);
}
    </script>
</body>
</html>

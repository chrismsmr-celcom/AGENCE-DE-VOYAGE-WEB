<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hôtels - Terra Voyage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #f5f7fa; }
        .search-summary-bar { background-color: #1a2b49; color: white; }
        .hotel-card { transition: all 0.3s ease; border: 1px solid #eef0f2; overflow: hidden; background: white; }
        .hotel-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(0,0,0,0.1); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-price-marker { background: transparent !important; border: none !important; }
        .custom-price-marker div { 
            display: flex; justify-content: center; align-items: center; 
            white-space: nowrap; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); 
        }
    </style>
</head>
<body>

    <header class="search-summary-bar py-4 sticky top-0 z-50 shadow-lg">
        <div class="max-w-7xl mx-auto px-4 flex flex-wrap items-center justify-between gap-4">
            <div class="flex items-center gap-6">
                <a href="index.html" class="text-white hover:opacity-80"><i class="fas fa-arrow-left"></i></a>
                <div class="flex flex-col">
                    <div class="flex items-center gap-2 text-sm font-bold">
                        <span id="res-city" class="uppercase">Chargement...</span>
                        <span class="text-[10px] bg-blue-500 px-2 py-0.5 rounded ml-2 uppercase">Hôtel</span>
                    </div>
                    <div class="text-[11px] opacity-80">
                        <span id="res-dates">...</span> • <span id="res-guests">...</span>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <select id="currency-selector" class="bg-white/10 border border-white/20 rounded-lg px-3 py-2 text-xs font-bold focus:outline-none text-white">
                    <option value="USD" class="text-gray-800">USD ($)</option>
                    <option value="EUR" class="text-gray-800">EUR (€)</option>
                </select>
                <button onclick="window.history.back()" class="bg-white/20 hover:bg-white/30 px-4 py-2 rounded-lg text-xs font-bold transition-all">Modifier</button>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-6 flex flex-col lg:flex-row gap-6">
        <aside class="w-full lg:w-72 space-y-4">
            <div class="relative h-32 w-full rounded-xl overflow-hidden bg-slate-800 flex items-center justify-center cursor-pointer group" onclick="toggleMapModal()">
                <i class="fas fa-map-marked-alt text-white/20 text-4xl group-hover:scale-110 transition-transform duration-500"></i>
                <div class="absolute bottom-3 bg-white/90 backdrop-blur px-3 py-1.5 rounded-full text-[9px] font-black uppercase tracking-widest shadow-lg">Voir la carte</div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-xs font-bold uppercase text-gray-400 mb-3 tracking-wider">Rechercher</h3>
                <div class="relative">
                    <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-300 text-xs"></i>
                    <input type="text" id="search-hotel-name" onkeyup="filterHotels()" placeholder="Nom de l'hôtel..." class="w-full pl-9 pr-3 py-2.5 bg-gray-50 border border-gray-100 rounded-lg text-sm focus:outline-none focus:border-blue-500 transition-all">
                </div>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-xs font-bold uppercase text-gray-400 mb-4 tracking-wider">Trier par</h3>
                <select id="sort-selector" onchange="filterHotels()" class="w-full text-sm font-bold text-blue-600 bg-blue-50 px-3 py-2.5 rounded-lg focus:outline-none border border-blue-100 cursor-pointer">
                    <option value="pop">Popularité</option>
                    <option value="price_asc">Prix le plus bas</option>
                    <option value="stars_desc">Étoiles (5 à 1)</option>
                </select>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                <h3 class="text-xs font-bold uppercase text-gray-400 mb-4 tracking-wider">Catégorie</h3>
                <div id="star-filters" class="space-y-3"></div>
            </div>
        </aside>

        <main class="flex-1 space-y-4">
            <div id="hotels-list" class="grid grid-cols-1 gap-6">
                <div class="text-center py-20 bg-white rounded-2xl shadow-sm border border-gray-100">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-blue-900"></div>
                    <p class="mt-4 text-gray-500 font-medium">Connexion au GDS Hotelbeds...</p>
                </div>
            </div>
        </main>
    </div>

    <div id="map-modal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 md:p-10">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" onclick="toggleMapModal()"></div>
        <div class="relative bg-white w-full max-w-6xl h-[85vh] rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row">
            <button onclick="toggleMapModal()" class="absolute top-4 right-4 z-[1001] w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-lg hover:bg-gray-100 transition-all">
                <i class="fas fa-times text-gray-900"></i>
            </button>
            <div class="flex-1 bg-gray-200 relative"><div id="big-map" class="w-full h-full"></div></div>
            <div class="w-full md:w-80 bg-white border-l border-gray-100 flex flex-col">
                <div class="p-6 border-b border-gray-50">
                    <h3 class="font-bold text-gray-900">Sur la carte</h3>
                    <p class="text-[10px] text-blue-600 font-bold uppercase mt-1" id="modal-hotel-count">0 hôtels</p>
                </div>
                <div class="flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar" id="modal-hotel-list"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = "https://agence-de-voyage-web.onrender.com";
        let rawHotels = [];
        let map;
        const params = new URLSearchParams(window.location.search);

        document.addEventListener('DOMContentLoaded', () => {
            // Mapping des paramètres URL (TerraEngine utilise 'dest' et 'departureDate')
            const city = params.get('dest') || params.get('city') || 'Destination';
            const checkin = params.get('departureDate') || params.get('checkin');
            const checkout = params.get('returnDate') || params.get('checkout');
            const adults = params.get('adults') || 1;

            document.getElementById('res-city').innerText = city.toUpperCase();
            document.getElementById('res-dates').innerText = `${checkin} au ${checkout}`;
            document.getElementById('res-guests').innerText = `${adults} Voyageur(s)`;

            renderStarFilters();
            fetchHotels();
        });

        async function fetchHotels() {
            // On prépare le payload avec les clés que le serveur attend
            const payload = {
                destinationCode: params.get('dest'),
                checkIn: params.get('departureDate'),
                checkOut: params.get('returnDate'),
                adults: params.get('adults') || 1
            };

            try {
                const response = await fetch(`${API_BASE_URL}/search-hotels`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) throw new Error('Erreur de réponse serveur');
                const data = await response.json();
                
                // On normalise les données Hotelbeds
                rawHotels = (data.hotels || []).map(h => ({
                    id: h.code,
                    name: h.name,
                    stars: parseInt(h.categoryCode) || 3, // Hotelbeds renvoie souvent categoryCode (ex: 4EST)
                    price: h.minRate || (Math.random() * 200 + 50).toFixed(2), // Fallback prix si test
                    address: h.address || "Adresse disponible à la réservation",
                    lat: h.latitude,
                    lng: h.longitude,
                    image: h.images && h.images.length > 0 ? `https://photos.hotelbeds.com/giata/${h.images[0].path}` : 'https://via.placeholder.com/400x300?text=Terra+Voyage'
                }));

                filterHotels();
            } catch (error) {
                console.error("Erreur:", error);
                document.getElementById('hotels-list').innerHTML = `
                    <div class="text-center py-20 bg-white rounded-2xl border-2 border-dashed border-red-100">
                        <i class="fas fa-exclamation-circle text-red-500 text-3xl mb-4"></i>
                        <p class="text-red-600 font-bold">Aucune chambre disponible pour ces dates.</p>
                        <button onclick="location.reload()" class="mt-4 text-xs bg-gray-100 px-4 py-2 rounded-full font-bold">Réessayer</button>
                    </div>`;
            }
        }

        function filterHotels() {
            const query = document.getElementById('search-hotel-name').value.toLowerCase();
            const stars = Array.from(document.querySelectorAll('.filter-star:checked')).map(el => parseInt(el.value));
            const sortBy = document.getElementById('sort-selector').value;

            let filtered = rawHotels.filter(h => {
                const matchName = h.name.toLowerCase().includes(query);
                const matchStars = stars.length === 0 || stars.includes(h.stars);
                return matchName && matchStars;
            });

            if (sortBy === 'price_asc') filtered.sort((a, b) => a.price - b.price);
            if (sortBy === 'stars_desc') filtered.sort((a, b) => b.stars - a.stars);

            renderResults(filtered);
        }

        function renderResults(hotels) {
            const container = document.getElementById('hotels-list');
            if (hotels.length === 0) {
                container.innerHTML = '<p class="text-center py-10 text-gray-500">Aucun résultat trouvé.</p>';
                return;
            }

            container.innerHTML = hotels.map(h => `
                <div class="hotel-card rounded-2xl flex flex-col md:flex-row overflow-hidden shadow-sm">
                    <div class="md:w-72 h-48 md:h-auto bg-gray-100">
                        <img src="${h.image}" class="w-full h-full object-cover" onerror="this.src='https://via.placeholder.com/400x300?text=Hotel'">
                    </div>
                    <div class="flex-1 p-6 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start">
                                <h3 class="text-lg font-bold text-gray-900 leading-tight">${h.name}</h3>
                                <div class="flex text-yellow-400 text-[10px] gap-0.5">
                                    ${Array(h.stars > 5 ? 5 : h.stars).fill('<i class="fas fa-star"></i>').join('')}
                                </div>
                            </div>
                            <p class="text-xs text-gray-500 mt-2"><i class="fas fa-map-marker-alt text-blue-500 mr-1"></i> ${h.address}</p>
                        </div>
                        <div class="flex items-end justify-between mt-6">
                            <div>
                                <p class="text-2xl font-black text-blue-900">${h.price}$</p>
                                <p class="text-[9px] text-gray-400 uppercase font-bold tracking-tighter">Prix total TTC</p>
                            </div>
                            <button onclick="alert('Réservation via GDS Hotelbeds en cours...')" class="bg-blue-900 text-white px-8 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-blue-800 transition-all shadow-lg shadow-blue-900/20">
                                Réserver
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // --- MAP LOGIC ---
        function toggleMapModal() {
            const modal = document.getElementById('map-modal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                setTimeout(initLeaflet, 300);
            }
        }

        function initLeaflet() {
            if (map) { map.invalidateSize(); return; }
            const lat = rawHotels[0]?.lat || -4.325;
            const lng = rawHotels[0]?.lng || 15.31;
            map = L.map('big-map').setView([lat, lng], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            rawHotels.forEach(h => {
                if (h.lat && h.lng) {
                    const icon = L.divIcon({
                        className: 'custom-price-marker',
                        html: `<div class="bg-blue-900 text-white px-2 py-1 rounded-full font-bold text-[10px] border border-white">${h.price}$</div>`,
                        iconSize: [40, 20]
                    });
                    L.marker([h.lat, h.lng], { icon }).addTo(map).bindPopup(`<b>${h.name}</b>`);
                }
            });
            renderModalHotelList();
        }

        function renderModalHotelList() {
            const container = document.getElementById('modal-hotel-list');
            document.getElementById('modal-hotel-count').innerText = `${rawHotels.length} hôtels disponibles`;
            container.innerHTML = rawHotels.slice(0, 15).map(h => `
                <div class="flex gap-3 p-2 hover:bg-gray-50 rounded-xl cursor-pointer border-b border-gray-50">
                    <img src="${h.image}" class="w-12 h-12 rounded-lg object-cover">
                    <div>
                        <h4 class="text-[10px] font-bold text-gray-900 leading-tight">${h.name}</h4>
                        <p class="text-[11px] font-black text-blue-900">${h.price}$</p>
                    </div>
                </div>
            `).join('');
        }

        function renderStarFilters() {
            const container = document.getElementById('star-filters');
            [5, 4, 3, 2].forEach(num => {
                container.innerHTML += `
                    <label class="flex items-center gap-3 cursor-pointer group">
                        <input type="checkbox" value="${num}" class="filter-star w-4 h-4 rounded text-blue-600 border-gray-300" onchange="filterHotels()" checked>
                        <div class="flex text-yellow-400 text-[10px]">
                            ${Array(num).fill('<i class="fas fa-star"></i>').join('')}
                        </div>
                    </label>`;
            });
        }
    </script>
</body>
</html>

.m-sider-filter {
    width: 300px;
    background: #fff;
    border-radius: 8px;
    padding: 15px;
    font-family: 'Inter', sans-serif;
}

/* Titres de sections */
.c-filter-common__subtit {
    font-size: 16px;
    font-weight: 600;
    color: #333;
    margin-bottom: 12px;
}

/* Items de liste */
.filter-item {
    display: flex;
    align-items: center;
    padding: 8px 0;
    cursor: pointer;
}

.filter-label {
    display: flex;
    justify-content: space-between;
    width: 100%;
    align-items: center;
}

/* Logos & Icônes */
.baggage-icon, .alliance-icon {
    width: 18px;
    height: 18px;
    margin-right: 10px;
    vertical-align: middle;
}

/* Prix (Description) */
.filter-desc {
    color: #888;
    font-size: 12px;
}

/* Histogramme (Times) */
.filter-timeTable-strip {
    display: flex;
    align-items: flex-end;
    height: 60px;
    padding: 0;
    list-style: none;
    gap: 2px;
    margin: 15px 0;
}

.filter-timeTable-bar {
    flex: 1;
    border-radius: 2px 2px 0 0;
    position: relative;
    transition: background-color 0.3s;
}

.filter-timeTable-bar:hover {
    background-color: #3366ff !important;
}
/* Cache le contenu "Show More" par défaut */
.hidden { display: none !important; }

/* Style du séparateur */
.separator {
    border: 0;
    border-top: 1px solid #f0f0f0;
    margin: 20px 0;
}

/* Alignement des alliances */
.item-left {
    display: flex;
    align-items: center;
    gap: 8px;
}

.item-left img {
    width: 16px;
    height: 16px;
}

/* Histogramme simplifié */
.histogram-container {
    display: flex;
    align-items: flex-end;
    height: 40px;
    gap: 2px;
    margin: 10px 0;
}

.bar {
    flex: 1;
    background: #edf1ff;
    border-radius: 2px 2px 0 0;
}
/* Bloc Map */
.map-filter-box {
    height: 100px;
    background-size: cover;
    background-position: center;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
}

.btn-map {
    background: #fff;
    color: #0066ff;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}

/* Titres */
.filter-label-title {
    font-weight: 700;
    font-size: 14px;
    margin: 15px 0;
    color: #333;
}

/* Grille d'étoiles (Star Rating) */
.star-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
}

.star-item {
    border: 1px solid #ddd;
    padding: 8px;
    text-align: center;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
}

.star-item:hover { border-color: #0066ff; color: #0066ff; }

/* Grille de prix rapides */
.quick-price-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 6px;
    margin-top: 15px;
}

.price-btn {
    background: #f5f7fa;
    border: none;
    padding: 6px;
    font-size: 11px;
    border-radius: 4px;
    cursor: pointer;
}

.price-btn:hover { background: #e8ecf2; }

<script>
    const params = new URLSearchParams(window.location.search);
    const currentMode = params.get('mode') || 'stays';
    const API_BASE_URL = "https://agence-de-voyage-web.onrender.com"; 

    document.addEventListener('DOMContentLoaded', () => {
        // Init UI
        document.getElementById('header-dest').innerText = params.get('dest') || 'Voyage';
        document.getElementById('header-dates').innerText = params.get('departureDate') || '--';
        
        fetchResults();

        // Header Scroll Effect
        window.addEventListener('scroll', () => {
            const header = document.getElementById('mainHeader');
            if (window.scrollY > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');
        });
    });

    async function fetchResults() {
    const container = document.getElementById('results-container');
    const filtersContainer = document.getElementById('dynamic-filters');

    try {
        const endpoint = currentMode === 'flights' ? '/search-flights' : '/search-hotels';
        
        // On vérifie que les paramètres existent pour éviter les URLs invalides
        const dest = params.get('dest');
        const depDate = params.get('departureDate');
        
        if (!dest || !depDate) {
            container.innerHTML = `<p class="text-center py-20">Paramètres de recherche incomplets.</p>`;
            return;
        }

        const bodyContent = currentMode === 'flights' ? {
            origin: "PAR", 
            destination: dest,
            departureDate: depDate,
            passengers: parseInt(params.get('adults') || 1),
            cabinClass: (params.get('class') || 'economy').toLowerCase(),
            tripType: params.get('tripType') || 'one_way'
        } : {
            destinationCode: dest,
            checkIn: depDate,
            checkOut: params.get('returnDate') || depDate, // Sécurité si retour vide
            adults: parseInt(params.get('adults') || 1)
        };

        const response = await fetch(`${API_BASE_URL}${endpoint}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(bodyContent)
        });

        if (!response.ok) throw new Error('Serveur GDS injoignable');

        const data = await response.json();
        container.innerHTML = ""; 

        if (currentMode === 'flights') {
            // Utilise tes données réelles pour les filtres si possible
            renderFlightFilters(filtersContainer); 
            displayFlights(data.offers, container);
        } else {
            // On passe un objet de config à tes nouveaux filtres d'hôtels
            const hotelConfig = {
                city: dest,
                maxPrice: 1000,
                popular: [{id: 'wifi', label: 'WiFi Gratuit'}, {id: 'p', label: 'Parking'}],
                popularTotal: 5,
                priceBuckets: ["0-100€", "100-300€", "+500€"]
            };
            renderHotelFilters(hotelConfig); 
            displayHotels(data.hotels, container);
        }

        const count = currentMode === 'flights' ? (data.offers?.length || 0) : (data.hotels?.length || 0);
        document.getElementById('result-status').innerText = `${count} ${currentMode === 'flights' ? 'Vols' : 'Hôtels'} Disponibles`;

    } catch (error) {
        console.error("Fetch Error:", error);
        container.innerHTML = `<div class="text-center py-20"><p class="font-black uppercase text-red-500">Erreur de connexion GDS</p></div>`;
    }
}
    function displayFlights(offers, container) {
        if (!offers || offers.length === 0) {
            container.innerHTML = "<p class='text-center py-10 font-bold text-gray-400 uppercase tracking-widest'>Aucun vol trouvé</p>";
            return;
        }

        offers.forEach(offer => {
            const segment = offer.slices[0].segments[0];
            container.innerHTML += `
            <div class="result-card bg-white p-8 rounded-[2.5rem] flex flex-col md:flex-row items-center gap-8 group">
                <div class="w-16 h-16 bg-gray-50 rounded-2xl flex items-center justify-center font-black text-xs text-blue-600 border border-gray-100 uppercase italic">
                    ${offer.owner.iata_code}
                </div>
                
                <div class="flex-1 grid grid-cols-3 gap-4 items-center w-full">
                    <div class="text-center md:text-left">
                        <p class="text-2xl font-black italic tracking-tighter">${new Date(segment.departing_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">${segment.origin.iata_code}</p>
                    </div>

                    <div class="relative flex flex-col items-center">
                        <span class="text-[8px] font-black uppercase text-blue-600 mb-2">${offer.slices[0].segments.length > 1 ? 'Escale' : 'Direct'}</span>
                        <div class="w-full h-[1px] bg-gray-100 relative">
                            <i class="fas fa-plane absolute -top-[5px] left-1/2 -translate-x-1/2 text-[10px] text-gray-200 group-hover:text-blue-600 transition-all"></i>
                        </div>
                        <span class="text-[9px] font-bold text-gray-300 mt-2">${offer.slices[0].duration.replace('PT', '').toLowerCase()}</span>
                    </div>

                    <div class="text-center md:text-right">
                        <p class="text-2xl font-black italic tracking-tighter">${new Date(segment.arriving_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</p>
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">${segment.destination.iata_code}</p>
                    </div>
                </div>

                <div class="md:border-l border-gray-50 md:pl-10 text-center md:text-right w-full md:w-48">
                    <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-1">Tarif Privilège</p>
                    <p class="text-3xl font-black italic tracking-tighter text-black">${offer.total_amount}<span class="text-sm ml-1">${offer.total_currency}</span></p>
                    <button class="w-full mt-4 bg-black text-white py-3 rounded-2xl text-[9px] font-black uppercase tracking-[0.2em] hover:bg-blue-600 transition-all shadow-lg shadow-gray-200">Détails</button>
                </div>
            </div>`;
        });
    }

    function displayHotels(hotels, container) {
        if (!hotels || hotels.length === 0) {
            container.innerHTML = "<p class='text-center py-10 font-bold text-gray-400 uppercase tracking-widest'>Aucun établissement trouvé</p>";
            return;
        }

        hotels.forEach(hotel => {
            container.innerHTML += `
            <div class="result-card bg-white rounded-[2.5rem] overflow-hidden flex flex-col md:flex-row h-auto md:h-64 group">
                <div class="w-full md:w-72 bg-gray-100 relative overflow-hidden">
                    <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=500" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700" />
                    <div class="absolute top-4 left-4 bg-white/90 backdrop-blur px-3 py-1 rounded-full text-[8px] font-black uppercase tracking-widest">Premium</div>
                </div>
                
                <div class="p-8 flex-1 flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start">
                            <h3 class="text-2xl font-black italic leading-none uppercase tracking-tighter">${hotel.name}</h3>
                            <div class="flex text-yellow-400 text-[8px] gap-1">
                                ${'<i class="fas fa-star"></i>'.repeat(parseInt(hotel.categoryCode) || 4)}
                            </div>
                        </div>
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em] mt-3"><i class="fas fa-map-marker-alt text-blue-600 mr-2"></i> ${hotel.zoneName || 'Zone Exclusive'}</p>
                    </div>

                    <div class="flex justify-between items-end mt-6">
                        <div class="flex flex-col gap-1">
                            <span class="text-[9px] font-black uppercase text-green-500 bg-green-50 px-3 py-1 rounded-lg self-start">Confirmation Immédiate</span>
                        </div>
                        <div class="text-right">
                            <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest mb-1">Par nuit</p>
                            <p class="text-3xl font-black italic tracking-tighter">${hotel.minRate}€</p>
                            <button class="mt-3 bg-black text-white px-8 py-3 rounded-2xl text-[9px] font-black uppercase tracking-[0.2em] hover:bg-blue-600 transition-all">Réserver</button>
                        </div>
                    </div>
                </div>
            </div>`;
        });
    }

    function renderFlightFilters(f) {
        f.innerHTML = `
            <div class="space-y-6">
                <div>
                    <label class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-400 block mb-4">Escales</label>
                    <div class="space-y-3">
                        <label class="flex items-center gap-3 text-[11px] font-bold uppercase cursor-pointer">
                            <input type="checkbox" class="rounded border-gray-200 text-black focus:ring-0 w-4 h-4" checked> Direct
                        </label>
                        <label class="flex items-center gap-3 text-[11px] font-bold uppercase cursor-pointer">
                            <input type="checkbox" class="rounded border-gray-200 text-black focus:ring-0 w-4 h-4"> 1 Escale
                        </label>
                    </div>
                </div>
            </div>`;
    }

    function renderHotelFilters(f) {
        f.innerHTML = `
            <div>
                <label class="text-[9px] font-black uppercase tracking-[0.2em] text-gray-400 block mb-4">Standing</label>
                <div class="grid grid-cols-2 gap-2">
                    <button class="bg-black text-white py-2 rounded-xl text-[10px] font-bold uppercase">5 Étoiles</button>
                    <button class="bg-gray-50 text-gray-400 py-2 rounded-xl text-[10px] font-bold uppercase border border-gray-100">4 Étoiles</button>
                </div>
            </div>`;
    }
function renderFilters(data) {
    const container = document.getElementById('dynamic-filters');
    
    // On vide le squelette de chargement (animate-pulse)
    container.innerHTML = '';

    // Construction du template
    const filterHTML = `
        <div class="m-sider-filter">
            <div class="filter-section">
                <h2 class="filter-title">Recommended</h2>
                <div class="filter-group">
                    <label class="filter-item">
                        <input type="checkbox" data-code="DIRECT">
                        <span class="filter-label"><i class="icon-flight"></i> Nonstop</span>
                    </label>
                    <label class="filter-item">
                        <input type="checkbox" data-code="Baggage">
                        <span class="filter-label"><i class="icon-baggage"></i> Checked baggage included</span>
                    </label>
                    <div class="filter-more-content hidden" id="more-recommended">
                        <label class="filter-item">
                            <input type="checkbox" data-code="LCC">
                            <span class="filter-label">Hide budget airlines</span>
                        </label>
                    </div>
                    <button class="btn-show-more" onclick="toggleMore(this)">Show More <i class="icon-down"></i></button>
                </div>
            </div>

            <hr class="separator">

            <div class="filter-section">
                <h2 class="filter-title">Alliance</h2>
                <div class="filter-group">
                    ${data.alliances.map(alliance => `
                        <label class="filter-item">
                            <div class="item-left">
                                <input type="checkbox" value="${alliance.code}">
                                <img src="${alliance.logo}" alt="${alliance.name}">
                                <span>${alliance.name}</span>
                            </div>
                            <span class="price">US$${alliance.minPrice}</span>
                        </label>
                    `).join('')}
                </div>
            </div>

            <hr class="separator">

            <div class="filter-section">
                <h2 class="filter-title">Departure Time</h2>
                <div class="time-range-display" id="time-display">00:00 – 24:00</div>
                <div class="histogram-container">
                    ${data.histogram.map(h => `<div class="bar" style="height: ${h}%"></div>`).join('')}
                </div>
                <div class="range-slider-wrapper">
                    <input type="range" min="0" max="1440" value="0" class="slider" id="startTime">
                    <input type="range" min="0" max="1440" value="1440" class="slider" id="endTime">
                </div>
            </div>
        </div>
    `;

    container.innerHTML = filterHTML;
}

// Fonction de bascule (Show More)
function toggleMore(button) {
    const parent = button.parentElement;
    const moreContent = parent.querySelector('.filter-more-content');
    const isHidden = moreContent.classList.toggle('hidden');
    button.innerHTML = isHidden ? 'Show More <i class="icon-down"></i>' : 'Show Less <i class="icon-up"></i>';
}

                        <div class="star-item">
                            <span>${star === 2 ? '≤2' : star}</span>
                            <i class="icon-star">★</i>
                        </div>
                    `).join('')}
                </div>
            </div>

            <div class="common-filter-container">
                <p class="filter-label-title">Guest Rating</p>
                <ul class="filter-list">
                    <li class="checkbox-item"><input type="checkbox"> <span>Pleasant 6+</span></li>
                    <li class="checkbox-item"><input type="checkbox"> <span>Very Good 8+</span></li>
                </ul>
            </div>
        </div>
    `;

    container.innerHTML = hotelFilterHTML;
}

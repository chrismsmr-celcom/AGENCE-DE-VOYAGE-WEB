<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terra Voyage - Confirmation de réservation</title>
    <script src="https://cdn.tailwindcss.com/3.4.1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        .confirmation-card {
            background: white;
            border-radius: 2rem;
            border: 1px solid #e5e7eb;
            overflow: hidden;
        }
        .success-icon {
            background: linear-gradient(135deg, #10b981, #059669);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        .btn-primary {
            background: linear-gradient(135deg, #2563eb, #1e40af);
            color: white;
            font-weight: 800;
            padding: 0.75rem 2rem;
            border-radius: 1rem;
            transition: all 0.3s;
            display: inline-block;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3);
        }
        .btn-outline {
            border: 2px solid #2563eb;
            color: #2563eb;
            font-weight: 600;
            padding: 0.75rem 2rem;
            border-radius: 1rem;
            transition: all 0.3s;
            display: inline-block;
        }
        .btn-outline:hover {
            background: #eff6ff;
        }
    </style>
</head>
<body class="bg-gray-50 font-montserrat">

    <main class="min-h-screen flex items-center justify-center p-6">
        <div class="max-w-2xl w-full">
            <div class="confirmation-card p-8 md:p-12 text-center">
                
                <!-- Icône de succès -->
                <div class="success-icon mb-6">
                    <i class="fas fa-check text-white text-4xl"></i>
                </div>
                
                <h1 class="text-2xl md:text-3xl font-bold text-gray-800 mb-2">
                    Réservation confirmée !
                </h1>
                <p class="text-gray-500 mb-8">
                    Votre voyage est maintenant réservé. Un email de confirmation vous a été envoyé.
                </p>
                
                <!-- Détails de la réservation -->
                <div id="booking-details" class="bg-gray-50 rounded-xl p-6 mb-8 text-left">
                    <div class="text-center py-8 text-gray-400">
                        <i class="fas fa-spinner fa-spin text-2xl"></i>
                        <p class="mt-2">Chargement des détails...</p>
                    </div>
                </div>
                
                <!-- Actions -->
                <div class="flex flex-col sm:flex-row gap-4 justify-center">
                    <a href="/" class="btn-primary">
                        <i class="fas fa-home mr-2"></i> Retour à l'accueil
                    </a>
                    <button onclick="window.print()" class="btn-outline">
                        <i class="fas fa-print mr-2"></i> Imprimer
                    </button>
                </div>
                
                <p class="text-xs text-gray-400 mt-8">
                    Un email de confirmation a été envoyé à l'adresse fournie.<br>
                    En cas de question, contactez notre service client au <strong>+243 854 442 103</strong>
                </p>
            </div>
        </div>
    </main>

    <script type="module" src="./js/pages/confirmation.js"></script>
</body>
</html>
